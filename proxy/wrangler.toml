# Configurazione Cloudflare Worker — proxy admin di Arda Top
#
# I SECRET (GITHUB_PAT, ADMIN_PASSWORD) NON vanno qui: si impostano con
#   wrangler secret put GITHUB_PAT
#   wrangler secret put ADMIN_PASSWORD
# (oppure dal dashboard: Workers → arda-admin-proxy → Settings → Variables → Secrets)
#
# Qui sotto solo la variabile NON segreta dell'origine autorizzata (CORS).

name = "arda-admin-proxy"
main = "arda-admin-proxy.js"
compatibility_date = "2024-11-01"
workers_dev = true
preview_urls = false

[vars]
ALLOWED_ORIGIN = "https://roccobot.github.io"

# Rate limiting anti brute force sulla parola d'ordine admin: contatore per
# IP in Workers KV (namespace 'arda-rate-limit', creato dal dashboard il
# 2026-07-04). Limite e finestra sono definiti nel codice del Worker
# (RL_MAX/RL_WINDOW). Il binding è dichiarato qui, quindi sopravvive a ogni
# ricostruzione automatica via Git integration: configurato una volta, per
# sempre. (Storico: il binding nativo 'ratelimit' via unsafe.bindings veniva
# accettato dai Workers Builds ma restituiva sempre success:true, un no-op;
# sostituito con questo contatore KV, verificato funzionante.)
[[kv_namespaces]]
binding = "RL_KV"
id = "a76277f308ef412a8493bb71eee35e1b"
