# Configurazione Cloudflare Worker — proxy admin di Arda Top
#
# I SECRET (GITHUB_PAT, ADMIN_PASSWORD) NON vanno qui: si impostano con
#   wrangler secret put GITHUB_PAT
#   wrangler secret put ADMIN_PASSWORD
# (oppure dal dashboard: Workers → arda-admin-proxy → Settings → Variables → Secrets)
#
# Qui sotto solo la variabile NON segreta dell'origine autorizzata (CORS).

name = "arda-admin-proxy"
main = "arda-admin-proxy.js"
compatibility_date = "2024-11-01"
workers_dev = true
preview_urls = false

[vars]
ALLOWED_ORIGIN = "https://roccobot.github.io"

# Rate limiting anti brute force sulla parola d'ordine admin: contatore per
# IP in un Durable Object (classe RateLimiter nel codice), unico strumento
# sui Workers con conteggio globale e coerente. Limite e finestra sono nel
# codice (RL_MAX/RL_WINDOW). Binding + migrazione dichiarati qui, quindi
# sopravvivono a ogni ricostruzione automatica via Git integration:
# configurato una volta, per sempre.
# (Storico: il binding nativo 'ratelimit' [unsafe.bindings] è no-op sui
# Workers Builds; il contatore in KV è troppo lento [letture cachate];
# quello in memoria dell'isolate non conta [richieste sparse su isolate
# diversi]. Diagnosi 2026-07-04, PR #294-299.)
[[durable_objects.bindings]]
name = "RL_DO"
class_name = "RateLimiter"

# Migrazione una tantum: registra la classe come Durable Object con backend
# SQLite (disponibile anche sul piano gratuito).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]
