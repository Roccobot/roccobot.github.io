# Configurazione Cloudflare Worker — proxy admin di Arda Top
#
# I SECRET (GITHUB_PAT, ADMIN_PASSWORD) NON vanno qui: si impostano con
#   wrangler secret put GITHUB_PAT
#   wrangler secret put ADMIN_PASSWORD
# (oppure dal dashboard: Workers → arda-admin-proxy → Settings → Variables → Secrets)
#
# Qui sotto solo la variabile NON segreta dell'origine autorizzata (CORS).

name = "arda-admin-proxy"
main = "arda-admin-proxy.js"
compatibility_date = "2024-11-01"
workers_dev = true
preview_urls = false

[vars]
ALLOWED_ORIGIN = "https://roccobot.github.io"

# Rate limiting nativo dei Workers (open beta): al massimo 20 richieste ogni
# 60 secondi per chiave (qui la chiave è l'IP del chiamante, vedi il codice).
# Serve a rallentare il brute force sulla parola d'ordine admin: l'uso
# legittimo (1-2 richieste per salvataggio) non lo tocca mai. Il conteggio è
# per datacenter Cloudflare, non globale: per questo scopo è sufficiente.
# 'period' ammette solo 10 o 60; 'namespace_id' è un identificativo arbitrario
# ma stabile del contatore (non un id di risorsa da creare altrove).
[[unsafe.bindings]]
name = "LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
