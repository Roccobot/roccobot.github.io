<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Unico Anello — anteprima</title>
<style>
  body { background:#1a1510; color:#c8a860; font-family:Georgia,serif; display:flex; flex-direction:column; align-items:center; gap:40px; padding:60px 20px; }
  h2 { margin:0; font-size:1rem; letter-spacing:.15em; opacity:.6; text-transform:uppercase; }
  .row { display:flex; align-items:center; gap:32px; }
  .label { font-size:.75rem; opacity:.45; text-align:center; }
  svg.ring { overflow:visible; }
</style>
</head>
<body>

<h2>Unico Anello — Alt 5 minimal</h2>

<!-- Dimensione reale: ~22 px (dimensione badge nella pagina) -->
<div class="row">
  <div>
    <svg class="ring" width="22" height="22" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="11" fill="none" stroke="#f0bf24" stroke-width="4.4"/>
      <circle cx="18" cy="18" r="13.2" fill="none" stroke="#6e4d00" stroke-width="0.8"/>
      <circle cx="18" cy="18" r="8.8" fill="none" stroke="#6e4d00" stroke-width="0.8"/>
    </svg>
    <div class="label">22 px</div>
  </div>
  <div>
    <svg class="ring" width="48" height="48" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="11" fill="none" stroke="#f0bf24" stroke-width="4.4"/>
      <circle cx="18" cy="18" r="13.2" fill="none" stroke="#6e4d00" stroke-width="0.8"/>
      <circle cx="18" cy="18" r="8.8" fill="none" stroke="#6e4d00" stroke-width="0.8"/>
    </svg>
    <div class="label">48 px</div>
  </div>
  <div>
    <svg class="ring" width="96" height="96" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="11" fill="none" stroke="#f0bf24" stroke-width="4.4"/>
      <circle cx="18" cy="18" r="13.2" fill="none" stroke="#6e4d00" stroke-width="0.8"/>
      <circle cx="18" cy="18" r="8.8" fill="none" stroke="#6e4d00" stroke-width="0.8"/>
    </svg>
    <div class="label">96 px</div>
  </div>
</div>

<!-- Versione grande con simulazione iscrizione -->
<h2>Con iscrizione — simulazione</h2>
<svg class="ring" width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="arc-outer" d="M 140,140 m -105,0 a 105,105 0 1,1 210,0 a 105,105 0 1,1 -210,0"/>
    <path id="arc-inner" d="M 140,140 m -68,0 a 68,68 0 1,1 136,0 a 68,68 0 1,1 -136,0"/>
  </defs>

  <!-- Anello -->
  <circle cx="140" cy="140" r="85" fill="none" stroke="#f0bf24" stroke-width="34"/>
  <circle cx="140" cy="140" r="102" fill="none" stroke="#6e4d00" stroke-width="1.5"/>
  <circle cx="140" cy="140" r="68" fill="none" stroke="#6e4d00" stroke-width="1.5"/>

  <!-- Iscrizione in Lingua Nera, sulla corona esterna dell'anello — faint red -->
  <text font-family="Georgia,serif" font-size="9.5" fill="#cc1010" opacity="0.28" letter-spacing="1.2">
    <textPath href="#arc-outer" startOffset="2%">
      Ash nazg durbatulûk, ash nazg gimbatul, ash nazg thrakatulûk agh burzum-ishi krimpatul.
    </textPath>
  </text>

  <!-- Seconda riga (traduzione, più sbiadita) sulla corona interna -->
  <text font-family="Georgia,serif" font-size="7.5" fill="#cc1010" opacity="0.16" letter-spacing="0.8" font-style="italic">
    <textPath href="#arc-inner" startOffset="5%">
      Un Anello per domarli tutti, Un Anello per trovarli, Un Anello per ghermirli e nell'oscurità incatenarli.
    </textPath>
  </text>
</svg>

<p style="font-size:.78rem;opacity:.4;max-width:420px;text-align:center;margin:0">
  A 22 px (dimensione badge) l'iscrizione è invisibile — è l'effetto voluto.<br>
  Le due righe simulano la Lingua Nera incisa nell'oro e la traduzione italiana.
</p>

</body>
</html>
